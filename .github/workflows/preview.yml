name: Preview 배포 및 검증 (PR 전용)

on:
  pull_request:
    branches: [main, develop]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  verify-and-deploy:
    name: Preview 배포
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 단위 테스트 실행
        run: npm test

      # --- Vercel 배포 섹션 ---

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 환경 정보 가져오기
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 프로젝트 빌드 (Vercel Build)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel에 프로젝트 배포 및 URL 추출
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: PR에 Preview 링크 댓글 달기
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            const body = `🚀 **Preview 배포가 완료되었습니다!**\n\n| 서비스 | 링크 |\n| :--- | :--- |\n| **Vercel Preview** | [${url}](${url}) |\n\n---\n*최근 업데이트: ${new Date().toLocaleString('ko-KR')}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
