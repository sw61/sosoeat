name: Gemini PR 코드 리뷰

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  gemini-review:
    name: Gemini AI 코드 리뷰
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR diff 가져오기
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Gemini PR 리뷰 요청
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import subprocess
          import os

          # pr.diff 읽기
          with open('pr.diff', 'r') as f:
              diff = f.read()

          # 첫 20,000자만 사용 (토큰 제한)
          diff_limited = diff[:20000]
          if len(diff) > 20000:
              diff_limited += "\n\n... (diff가 너무 커서 일부 생략됨)"

          # 프롬프트 생성
          prompt = f"""당신은 소소잇(Sosoeat) 프로젝트의 시니어 프론트엔드 개발자입니다.
          아래 기준에 따라 PR diff를 한국어로 리뷰해주세요.

          ## 프로젝트 기술 스택
          - Next.js App Router, TypeScript
          - Tailwind CSS v4
          - Zustand (전역 상태), TanStack Query (서버 상태)
          - React Compiler 1.0 사용 중

          ## 반드시 검사해야 할 항목

          ### 1. React Compiler 관련 불필요한 최적화 (Critical)
          - React.memo 사용 시 즉시 지적
          - useCallback 사용 시 즉시 지적
          - useMemo는 정당한 이유가 없으면 지적

          ### 2. FSD (Feature-Sliced Design) 레이어 의존성 위반 (Critical)
          레이어 계층: app > widgets > features > entities > shared
          - 상위 규칙을 위반하는 import 감지

          ### 3. FSD Public API 규칙 위반 (Critical)
          - 슬라이스 내부 경로를 직접 참조하는 경우

          ### 4. HTTP 클라이언트 사용 규칙 위반 (Critical)
          - 클라이언트에서 apiServer 사용
          - 서버에서 fetchClient 사용

          ### 5. TanStack Query 컨벤션 위반 (Warning)
          - Query Key를 raw 배열로 사용
          - QueryClient를 외부에서 주입받는 패턴

          ### 6. 코드 품질 (Warning)
          - TypeScript any 타입 남용
          - 불필요한 중복 코드

          ### 7. 로직 및 버그 (Warning)
          - null/undefined 처리 누락
          - useEffect 의존성 배열 오류

          ### 8. 보안 (Critical)
          - XSS 위험
          - 민감 정보 노출

          ## PR Diff
          ```diff
          {diff_limited}
          ```"""

          # JSON 요청 생성
          request_body = {
              "contents": [{
                  "parts": [{"text": prompt}]
              }],
              "generationConfig": {"maxOutputTokens": 8192}
          }

          # Gemini API 호출
          result = subprocess.run([
              'curl', '-s',
              f'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-preview-05-06:generateContent?key={os.environ["GEMINI_API_KEY"]}',
              '-H', 'Content-Type: application/json',
              '-d', json.dumps(request_body)
          ], capture_output=True, text=True)

          response = json.loads(result.stdout)
          review = response.get('candidates', [{}])[0].get('content', {}).get('parts', [{}])[0].get('text', 'Gemini 응답을 파싱할 수 없습니다.')

          # GitHub Actions output에 저장
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"review<<EOF\n{review}\nEOF\n")
          PYTHON_EOF

      - name: PR에 리뷰 댓글 게시
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 Gemini AI 코드 리뷰

          ${{ steps.review.outputs.review }}

          ---
          *Gemini 2.5 Pro가 자동 생성한 리뷰입니다.*"
