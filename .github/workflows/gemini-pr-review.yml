name: Gemini PR 코드 리뷰

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  gemini-review:
    name: Gemini AI 코드 리뷰
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR diff 가져오기
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Gemini PR 리뷰 요청
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat pr.diff)

          # 프롬프트를 JSON 파일로 작성
          cat > /tmp/prompt.json << 'PROMPT_EOF'
          {
            "contents": [{
              "parts": [{
                "text": "당신은 소소잇(Sosoeat) 프로젝트의 시니어 프론트엔드 개발자입니다.\n아래 기준에 따라 PR diff를 한국어로 리뷰해주세요.\n\n## 프로젝트 기술 스택\n- Next.js App Router, TypeScript\n- Tailwind CSS v4\n- Zustand (전역 상태), TanStack Query (서버 상태)\n- React Compiler 1.0 사용 중\n\n## 반드시 검사해야 할 항목\n\n### 1. React Compiler 관련 불필요한 최적화 (Critical)\n- React.memo 사용 시 즉시 지적 (React Compiler가 자동 처리)\n- useCallback 사용 시 즉시 지적 (React Compiler가 자동 처리)\n- useMemo는 정당한 이유가 없으면 지적\n\n### 2. FSD (Feature-Sliced Design) 레이어 의존성 위반 (Critical)\n레이어 계층: app > widgets > features > entities > shared\n- shared가 상위 레이어를 import하는 경우\n- entities가 features, widgets, app을 import하는 경우\n- features가 다른 features, widgets, app을 import하는 경우\n- widgets가 app을 import하는 경우\n\n### 3. FSD Public API 규칙 위반 (Critical)\n- 슬라이스 내부 경로를 직접 참조하는 경우\n- 서버 전용 함수를 index.ts에 export하는 경우\n\n### 4. HTTP 클라이언트 사용 규칙 위반 (Critical)\n- 클라이언트에서 apiServer 사용 금지\n- 서버에서 fetchClient 사용 금지\n\n### 5. TanStack Query 컨벤션 위반 (Warning)\n- Query Key를 raw 배열로 직접 사용\n- useQuery와 useMutation을 도메인 단위가 아닌 방식으로 분리\n- QueryClient를 외부에서 주입받는 패턴\n\n### 6. 코드 품질 (Warning)\n- TypeScript any 타입 남용\n- 객체 타입 정의 시 interface 사용을 지향\n- 불필요한 중복 코드\n\n### 7. 컨벤션 (Info)\n- 파일/폴더명 kebab-case 준수 여부\n- index.ts export 규칙 준수 여부\n\n### 8. 로직 및 버그 (Warning)\n- null/undefined 처리 누락\n- 비동기 race condition\n- useEffect 의존성 배열 오류\n- 예외 처리 누락\n\n### 9. 보안 (Critical)\n- XSS 위험\n- 민감 정보 노출\n- 입력값 검증 누락\n\n### 10. 성능 (Info)\n- 불필요한 API 호출\n- key prop으로 index 사용\n\n## 리뷰 형식\n- Critical 이슈는 반드시 수정 요청\n- Warning은 개선 권고\n- Info는 참고용 제안\n- 각 지적사항에는 수정 방향을 제공해주세요\n\n## PR Diff\n```diff\nPR_DIFF_PLACEHOLDER\n```"
              }]
            }],
            "generationConfig": { "maxOutputTokens": 8192 }
          }
          PROMPT_EOF

          # PR Diff를 prompt에 삽입
          sed -i "s|PR_DIFF_PLACEHOLDER|$(printf '%s\n' "$DIFF" | sed -e 's/[\/&]/\\&/g')|g" /tmp/prompt.json

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-preview-05-06:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/prompt.json)

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Gemini 응답을 파싱할 수 없습니다."')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: PR에 리뷰 댓글 게시
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 Gemini AI 코드 리뷰

          ${{ steps.review.outputs.review }}

          ---
          *Gemini 2.5 Pro가 자동 생성한 리뷰입니다.*"
