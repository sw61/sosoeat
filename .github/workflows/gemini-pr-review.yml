name: Gemini PR 코드 리뷰

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  gemini-review:
    name: Gemini AI 코드 리뷰
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR diff 가져오기
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Gemini PR 리뷰 요청
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat pr.diff)
          PROMPT="당신은 소소잇(Sosoeat) 프로젝트의 시니어 프론트엔드 개발자입니다.
          아래 기준에 따라 PR diff를 한국어로 리뷰해주세요.

          ## 프로젝트 기술 스택
          - Next.js App Router, TypeScript
          - Tailwind CSS v4
          - Zustand (전역 상태), TanStack Query (서버 상태)
          - React Compiler 1.0 사용 중

          ## 반드시 검사해야 할 항목

          ### 1. React Compiler 관련 불필요한 최적화 (Critical)
          - \`React.memo\` 사용 시 즉시 지적 (React Compiler가 자동 처리)
          - \`useCallback\` 사용 시 즉시 지적 (React Compiler가 자동 처리)
          - \`useMemo\`는 아래 **정당한 이유**가 없으면 지적:
            - 무거운 연산(정렬, 필터링, 복잡한 파생 값 계산)의 명시적 캐싱
            - 참조 동일성이 꼭 필요한 경우 (e.g., useEffect dependency로 객체/배열을 넘길 때)
            - 정당한 이유 없이 단순 값 래핑에 useMemo를 쓰는 경우만 지적

          ### 2. FSD (Feature-Sliced Design) 레이어 의존성 위반 (Critical)
          레이어 계층: app > widgets > features > entities > shared
          - shared가 상위 레이어(entities, features, widgets, app)를 import하는 경우
          - entities가 features, widgets, app을 import하는 경우
          - features가 다른 features, widgets, app을 import하는 경우
          - widgets가 app을 import하는 경우
          - **같은 레이어 간 참조 금지**: features/auth에서 features/favorites를 import하거나, entities/meeting에서 entities/user를 import하는 경우

          ### 3. FSD Public API 규칙 위반 (Critical)
          - 슬라이스 내부 경로를 직접 참조하는 경우 (index.ts를 통해서만 접근해야 함)
            - ❌ \`import { useFavoritesCount } from '@/features/favorites/model/use-favorites-count'\`
            - ✅ \`import { useFavoritesCount } from '@/features/favorites'\`
          - 서버 전용 함수(\`*.server.ts\`, next/headers, apiServer 포함 파일)를 \`index.ts\`에 export하는 경우
            - 서버 전용 심볼은 반드시 \`index.server.ts\`를 통해서만 export해야 함
            - ❌ \`export { getFavoritesCount } from './api/favorites.server'\` in \`index.ts\`
            - ✅ \`index.server.ts\`에 별도로 export

          ### 4. HTTP 클라이언트 사용 규칙 위반 (Critical)
          - 클라이언트 컴포넌트에서 \`apiServer\` 사용 금지 (fetchClient만 허용)
          - 서버 컴포넌트/Server Action에서 \`fetchClient\` 사용 금지 (apiServer만 허용)
          - BFF Route Handler (\`app/api/*\`)에서 fetchClient/apiServer 사용 금지 (fetch() 직접 사용)

          ### 5. TanStack Query 컨벤션 위반 (Warning)
          - Query Key를 raw 배열로 직접 사용하는 경우 (반드시 \`xxxKeys\` factory 함수로 정의해야 함)
            - ❌ \`useQuery({ queryKey: ['meetings', id] })\`
            - ✅ \`useQuery({ queryKey: meetingKeys.detail(id) })\`
          - useQuery와 useMutation을 도메인 단위가 아닌 조회/변경으로 파일을 분리하는 경우
            - 올바른 분리 기준: 도메인 단위 (예: \`favorites.queries.ts\` 한 파일에 useQuery + useMutation)
          - \`QueryClient\`를 외부에서 주입받는 패턴 (useQueryClient()는 훅 내부에서 사용해야 함)
          - 서버 데이터를 Zustand에 저장하는 경우 (서버 상태는 TanStack Query로 관리)
          - TanStack Query로 관리해야 할 서버 데이터를 useState로 관리하는 경우

          ### 6. 코드 품질 (Warning)
          - TypeScript any 타입 남용
          - 객체 타입 정의 시 \`type\` 대신 \`interface\` 사용을 지향 (확장성)
          - 불필요한 중복 코드 (예: 유사한 컴포넌트가 여러 개 존재하는 경우)

          ### 7. 컨벤션 (Info)
          - 파일/폴더명 kebab-case 준수 여부
          - index.ts export 규칙 (페이지 내부 컴포넌트는 필요한 심볼만 named export, \`export * from\` 금지)

          ### 8. FSD 슬라이스 내부 구조 (Info)
          - \`ui/\`: UI 컴포넌트만 위치하는지
          - \`model/\`: 비즈니스 로직, 상태, 훅, 스키마만 위치하는지 (use-*.ts, *.schema.ts, *.store.ts)
          - \`api/\`: API 호출 함수만 위치하는지
          - \`lib/\`: 도메인 내부 전용 유틸 함수만 위치하는지

          ### 9. 로직 및 버그 (Warning)
          - null/undefined 처리 누락 (옵셔널 체이닝, 조건부 렌더링 미적용 등)
          - 비동기 race condition (useEffect 내 비동기 호출 시 cleanup 누락, 오래된 응답이 최신 상태를 덮어쓰는 경우)
          - useEffect 의존성 배열 누락 또는 과잉 (무한 루프, stale closure 유발 가능)
          - 이벤트 핸들러에서 발생할 수 있는 예외 처리 누락
          - 조건문 로직 오류 (경계값, off-by-one, 잘못된 비교 연산자)

          ### 10. 보안 (Critical)
          - XSS 위험 (\`dangerouslySetInnerHTML\` 사용 시 입력값 미검증)
          - 민감 정보(토큰, 키, 개인정보) 클라이언트 측 노출 또는 로그 출력
          - 사용자 입력값을 검증 없이 API 요청에 포함하는 경우

          ### 11. 성능 (Info)
          - 불필요한 API 호출 (조건 없이 매 렌더링마다 fetch하는 경우)
          - 리스트 렌더링 시 \`key\` prop으로 index 사용 (순서 변경 시 오동작 가능)
          - 대용량 데이터를 한 번에 렌더링하는 경우 (가상화 또는 페이지네이션 권고)

          ## 리뷰 형식
          - Critical 이슈는 반드시 수정 요청
          - Warning은 개선 권고
          - Info는 참고용 제안
          - 잘 작성된 코드는 칭찬도 해주세요
          - 각 지적사항에는 수정 방향이나 예시 코드를 제공해주세요

          ## PR Diff
          \`\`\`diff
          ${DIFF}
          \`\`\`"

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-preview-05-06:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { maxOutputTokens: 8192 }
            }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Gemini 응답을 파싱할 수 없습니다."')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: PR에 리뷰 댓글 게시
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 Gemini AI 코드 리뷰

          ${{ steps.review.outputs.review }}

          ---
          *Gemini 2.5 Pro가 자동 생성한 리뷰입니다.*"
